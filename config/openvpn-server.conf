# ============================================================
# OpenVPN Server Configuration
# ============================================================
# برای استفاده: این فایل را به /etc/openvpn/server/server.conf کپی کنید
# یا از install-openvpn.sh برای نصب خودکار استفاده کنید.
# ============================================================

port 1194
proto udp
dev tun

# ─── گواهی‌ها ────────────────────────────────────────────
ca    /etc/openvpn/server/ca.crt
cert  /etc/openvpn/server/server.crt
key   /etc/openvpn/server/server.key
dh    /etc/openvpn/server/dh.pem

# ─── TLS Authentication ──────────────────────────────────
# این کلید لایه امنیتی اضافی HMAC روی handshake اضافه می‌کند
tls-auth /etc/openvpn/server/ta.key 0
tls-version-min 1.2
tls-cipher TLS-ECDHE-ECDSA-WITH-AES-256-GCM-SHA384:TLS-ECDHE-RSA-WITH-AES-256-GCM-SHA384

# ─── رمزنگاری ────────────────────────────────────────────
cipher AES-256-GCM
auth SHA256
ncp-ciphers AES-256-GCM:AES-128-GCM

# ─── شبکه VPN ────────────────────────────────────────────
# کاربران IP از range 10.8.0.x دریافت می‌کنند
server 10.8.0.0 255.255.255.0

# همه ترافیک از VPN هدایت شود
push "redirect-gateway def1 bypass-dhcp"
push "dhcp-option DNS 1.1.1.1"
push "dhcp-option DNS 8.8.8.8"

# ─── پایداری اتصال ───────────────────────────────────────
keepalive 10 120
persist-key
persist-tun

# ─── امنیت ──────────────────────────────────────────────
# اجرا با کاربر بدون دسترسی پس از راه‌اندازی
user nobody
group nogroup

# حداکثر اتصالات همزمان
# max-clients 100

# برای اجازه چند اتصال با یک گواهی (کاربران مختلف با گواهی جداگانه)
; duplicate-cn

# ─── ابطال گواهی‌ها (CRL) ────────────────────────────────
# پس از revoke کردن هر گواهی، این خط را فعال کنید:
# crl-verify /etc/openvpn/easy-rsa/pki/crl.pem

# ─── لاگ ────────────────────────────────────────────────
status  /var/log/openvpn/openvpn-status.log 30
log-append /var/log/openvpn/openvpn.log
verb 3
mute 20

# ─── سایر تنظیمات ────────────────────────────────────────
# جلوگیری از مشکل با برخی firewallها
# explicit-exit-notify 1

# مناسب برای کاربران موبایل که IP تغییر می‌دهند
# float
